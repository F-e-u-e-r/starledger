name: Discovery Inbox

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: discovery-inbox
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run discovery pipeline
        env:
          STAR_SYNC_TOKEN: ${{ secrets.STAR_SYNC_TOKEN }}
        run: |
          node packages/discovery/dist/cli.js \
            --inbox config/discovery-inbox.yaml \
            --decisions config/discovery-decisions.yaml \
            --stars stars.json \
            --out-dir .

      - name: Check for changes
        id: changes
        run: |
          git add --intent-to-add discovery-candidates.json discovery-candidates-meta.json 2>/dev/null || true
          if git diff --quiet -- discovery-candidates.json discovery-candidates-meta.json 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="discovery/inbox-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add discovery-candidates.json discovery-candidates-meta.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(discovery): update candidate artifacts"
          git push origin "$BRANCH"
          gh pr create \
            --title "feat(discovery): update candidate artifacts" \
            --body "$(cat <<'EOF'
          ## Summary

          Updated discovery candidate artifacts from manual sources.

          - Generated by the discovery inbox pipeline
          - Candidates resolved via GitHub API
          - Deduplicated against stars.json

          Review the candidates before merging.
          EOF
          )"

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No candidate changes detected. Nothing to do."
