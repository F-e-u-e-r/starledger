name: Sync stars

on:
  schedule:
    # Non-zero minute (avoid the top-of-hour stampede on GitHub's scheduler).
    - cron: '23 5 * * *'
  workflow_dispatch:

# Write access for the dataset commit only. The exporter pushes with the GitHub
# App token (a ruleset bypass actor); Pages deploys via pages.yml's own push
# trigger on the data commit, so this job needs neither pages nor id-token.
permissions:
  contents: write

concurrency:
  group: sync-stars
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Publish to the protected default branch with a dedicated GitHub App
      # installation token. The App is scoped to THIS repository and is a
      # ruleset bypass actor on main, so the dataset commit can land without a
      # broad github-actions[bot] bypass or an admin PAT. actions/checkout
      # persists this token as the git credential, so the exporter's push
      # authenticates as the App. STAR_SYNC_TOKEN stays a read-only stars/API
      # token and is NOT used for git auth.
      - name: create sync app token
        id: sync-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.STARLEDGER_SYNC_APP_ID }}
          private-key: ${{ secrets.STARLEDGER_SYNC_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ steps.sync-token.outputs.token }}

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      # The exporter validates, then commits + pushes ONLY on a content change.
      # It reads stars with STAR_SYNC_TOKEN; the commit is pushed with the
      # checkout-configured GitHub App token (a ruleset bypass actor on main),
      # never with STAR_SYNC_TOKEN.
      - name: run exporter
        id: export
        env:
          STAR_SYNC_TOKEN: ${{ secrets.STAR_SYNC_TOKEN }}
          # actions/checkout pins the event SHA in detached HEAD; tell the
          # exporter which branch to push the dataset commit to.
          STARLEDGER_PUBLISH_BRANCH: ${{ github.ref_name }}
          # A GitHub secondary-rate-limit cooldown (Retry-After) can be 300s,
          # which exceeds the conservative 120s library default and would abort
          # the run. The daily job can afford to wait, so widen the budget.
          STARLEDGER_RETRY_MAX_TOTAL_WAIT_MS: '600000'
        run: |
          echo "workflow sha: $GITHUB_SHA"
          echo "checked out sha: $(git rev-parse HEAD)"
          node --input-type=module -e "const m = await import('./packages/exporter/dist/index.js'); console.log('exporter dist loaded:', m.EXPORTER_VERSION)"
          before=$(git rev-parse HEAD)
          set +e
          node packages/exporter/dist/cli.js
          status=$?
          set -e
          after=$(git rev-parse HEAD)
          echo "sha=$after" >> "$GITHUB_OUTPUT"
          if [ "$before" != "$after" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$status" -ne 0 ]; then
            echo "::error::exporter exited with status $status on commit $before"
            exit "$status"
          fi

      - name: validate the committed dataset
        run: pnpm exec tsx packages/deploy/src/cli.ts check-data --data .
